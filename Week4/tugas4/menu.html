          <a href="garis_hidup.html">Garis Hidup</a>

        <div class="content-area">
          <table class="menu-table">
            <tr>
              <th>No</th>
              <th>Makanan/Minuman</th>
              <th>Harga</th>
              <th>Pesan</th>
              <td rowspan="7" class="reset-cell">
                <button type="button" id="btn-reset">Reset</button>
              </td>
            </tr>
            <tr>
              <td>1</td>
              <td>Mie Goreng</td>
              <td>@ Rp 15000</td>

              <td>2</td>
              <td>Nasi Goreng</td>
              <td>@ Rp 20000</td>

            <tr>
              <td>3</td>
              <td>Ayam Mentega</td>
              <td>@ Rp 15000</td>
              <td><input type="number" id="qty-ayam-mentega" value="0" min="0" /></td>
            </tr>
            <tr>
              <td colspan="3" class="text-right">Jumlah Total</td>
              <td>
                <input type="text" id="jumlah-total" value="0" readonly />
              </td>
            </tr>
            <tr>
              <td colspan="3" class="text-right">Diskon</td>
              <td><input type="text" id="diskon" value="0" readonly /></td>
            </tr>
            <tr>
              <td colspan="3" class="text-right">Jumlah Bayar</td>
              <td>
                <input type="text" id="jumlah-bayar" value="0" readonly />
              </td>
            </tr>
