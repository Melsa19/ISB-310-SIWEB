<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Preferensi Warna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="judul">Preferensi Warna</h1>

    <fieldset>
        <legend>Warna</legend>

        <div class="item">
            <span>1. Warna latarbelakang</span>
            <div class="color-box" id="bgBox"></div>
        </div>

        <div class="item">
            <span>2. Warna teks</span>
            <div class="color-box" id="textBox"></div>
        </div>

    </fieldset>

    <button id="saveBtn">Simpan</button>

    <!-- Modal -->
    <div class="modal" id="colorModal">
        <div class="modal-content">
            <div class="modal-header">
                <button id="cancelBtn">Cancel</button>
                <h3>Choose a color</h3>
                <button id="selectBtn">Select</button>
            </div>

            <div class="color-grid" id="colorGrid"></div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
